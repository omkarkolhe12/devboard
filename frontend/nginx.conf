# Frontend gateway: serve the built SPA and proxy /api/* to the Go backend.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API → Go backend. The backend mounts its routes at the root (/projects,
    # /tasks, /search), so we strip the /api prefix here.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA history fallback — every non-asset route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
